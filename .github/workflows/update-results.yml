name: Update results

on:
  schedule:
    # Hourly during the tournament window (11 Jun – 20 Jul 2026, UTC).
    # fetch.mjs no-ops when nothing changed, so most runs commit nothing.
    - cron: '0 * * * *'
  workflow_dispatch: {}

# Only one update at a time; let an in-progress run finish.
concurrency:
  group: update-results
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Compute standings from FIFA
        # Manual runs bypass the tournament-window guard.
        env:
          FORCE: ${{ github.event_name == 'workflow_dispatch' && '1' || '' }}
        run: node scripts/fetch.mjs

      - name: Commit results if changed
        run: |
          # Every league's results file (golden-shrew + nelson + any future ones).
          files=$(git ls-files 'data/results*.json')
          if git diff --quiet -- $files; then
            echo "No change in results files"
            exit 0
          fi
          git config user.name "results-bot"
          git config user.email "actions@users.noreply.github.com"
          git add $files
          # [skip ci] stops Cloudflare Pages rebuilding on every data commit — the site
          # fetches the results files from the CDN at runtime, so no rebuild is needed.
          git commit -m "data: update results $(date -u +'%Y-%m-%dT%H:%MZ') [skip ci]"
          git push
